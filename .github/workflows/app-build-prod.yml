name: App Build and Deploy Prod

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-southeast-1
  ECR_REPOSITORY: terraform-aws-ecs-multi-env-platform-prod-app
  ECS_CLUSTER: terraform-aws-ecs-multi-env-platform-prod-cluster
  ECS_SERVICE: terraform-aws-ecs-multi-env-platform-prod-app-svc

jobs:
  build-push-deploy-prod:
    name: Build Push Deploy Prod App
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required CI variables
        run: |
          test -n "${{ vars.AWS_APP_PROD_ROLE_ARN }}" || (echo "Missing repository variable: AWS_APP_PROD_ROLE_ARN" && exit 1)

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_APP_PROD_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify caller identity
        run: aws sts get-caller-identity

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          SHA_TAG: ${{ github.sha }}
        run: |
          SHORT_SHA="${SHA_TAG::12}"
          docker build \
            -t "$REGISTRY/$ECR_REPOSITORY:bootstrap" \
            -t "$REGISTRY/$ECR_REPOSITORY:$SHORT_SHA" \
            .
          docker push "$REGISTRY/$ECR_REPOSITORY:bootstrap"
          docker push "$REGISTRY/$ECR_REPOSITORY:$SHORT_SHA"

      - name: Force ECS deployment
        run: |
          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$ECS_SERVICE" \
            --force-new-deployment

      - name: Wait for service stability
        run: |
          aws ecs wait services-stable \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE"