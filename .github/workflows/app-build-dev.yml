name: App Build Dev

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "app/**"
      - ".github/workflows/app-build-dev.yml"

permissions:
  id-token: write
  contents: read

jobs:
  build-and-push-dev:
    name: Build and Push Dev App
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_APP_DEV_ROLE_ARN }}
          aws-region: ap-southeast-1

      - name: Verify caller identity
        run: aws sts get-caller-identity

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: terraform-aws-ecs-multi-env-platform-dev-app
          IMAGE_TAG: bootstrap
          SHA_TAG: ${{ github.sha }}
        run: |
          SHORT_SHA="${SHA_TAG::12}"
          docker build \
            -t "$REGISTRY/$REPOSITORY:$IMAGE_TAG" \
            -t "$REGISTRY/$REPOSITORY:$SHORT_SHA" \
            .
          docker push "$REGISTRY/$REPOSITORY:$IMAGE_TAG"
          docker push "$REGISTRY/$REPOSITORY:$SHORT_SHA"